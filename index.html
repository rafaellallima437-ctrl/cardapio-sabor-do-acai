<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Roxo - Pedidos de Açaí</title>
    <style>
        /* Estilo Geral focado no Roxo */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #2e004f; /* Fundo roxo escuro */
            margin: 20px; 
            color: #fff; 
        }
        .container { 
            max-width: 600px; 
            background: #4a148c; /* Cardápio Roxo Vibrante */
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5); 
            margin: auto; 
            border: 2px solid #7b1fa2;
        }
        h2 { 
            color: #ffeb3b; /* Amarelo para destacar o título */
            text-align: center; 
            border-bottom: 2px solid #ffeb3b; 
            padding-bottom: 10px;
            text-transform: uppercase;
        }
        h3 { color: #e1bee7; margin-top: 20px; margin-bottom: 5px; border-left: 5px solid #ffeb3b; padding-left: 10px; }
        
        label { font-weight: bold; margin-top: 15px; display: block; color: #fff; }
        
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            margin-bottom: 5px; 
            border: 2px solid #7b1fa2; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px;
            background-color: #fff;
            color: #333;
        }

        /* Botão Enviar WhatsApp */
        button { 
            background-color: #25d366; 
            color: white; 
            padding: 16px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold; 
            margin-top: 25px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        button:hover { background-color: #1ebe57; transform: scale(1.02); }

        .info-complementos { 
            font-size: 13px; 
            color: #ffeb3b; 
            margin-top: 5px; 
            font-style: italic; 
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 5px;
        }
        
        .taxa-entrega {
            background-color: #ffeb3b !important;
            color: #4a148c !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🍇 Pedido de Açaí</h2>
    <form id="formPedido">
        
        <h3>👤 Dados de Entrega</h3>
        <label for="nome">Nome do Cliente:</label>
        <input type="text" id="nome" required placeholder="Seu nome">

        <label for="endereco">Onde devemos entregar?</label>
        <textarea id="endereco" required placeholder="Digite Rua, Número e Bairro"></textarea>

        <h3>📋 Escolha o Sabor</h3>
        <label for="sabor">Sabor do Açaí:</label>
        <select id="sabor" required onchange="atualizarTamanhos()">
            <option value="">-- Clique para escolher o sabor --</option>
            <option value="Açaí de Frutas">Açaí de Frutas</option>
            <option value="Trufado de Nutella">Trufado de Nutella</option>
            <option value="Açaí de Paçoca">Açaí de Paçoca</option>
            <option value="Bananinha com Nutella">Bananinha com Nutella</option>
            <option value="Dois Amores">Dois Amores</option>
            <option value="Trufado com Nutella e Ninho">Trufado com Nutella e Ninho</option>
            <option value="Açaí Zero">Açaí Zero</option>
            <option value="Ouro Branco">Ouro Branco</option>
            <option value="Guloseimas">Guloseimas</option>
            <option value="Batidinha de Açaí">Batidinha de Açaí</option>
            <option value="Açaí Batido">Açaí Batido</option>
            <option value="Trufado de Cookies">Trufado de Cookies</option>
            <option value="Sonho de Valsa">Sonho de Valsa</option>
            <option value="Ovomaltine">Ovomaltine</option>
            <option value="Splash de Ninho">Splash de Ninho</option>
            <option id="optSalada" value="Salada de Frutas Gourmet">Salada de Frutas Gourmet</option>
            <option id="optChurros" value="Mini Churros">Mini Churros</option>
            <option id="optSanduiche" value="Sanduíche Natural">Sanduíche Natural</option>
        </select>
        <div id="infoComplementos" class="info-complementos">Escolha um sabor para ver os complementos.</div>

        <div id="secaoTamanho" style="display: none;">
            <label for="tamanho">Selecione o Tamanho:</label>
            <select id="tamanho"></select>
        </div>

        <div id="secaoCoberturaBananinha" style="display: none; background: #6a1b9a; padding: 15px; border-radius: 8px; border: 2px dashed #ffeb3b; margin-top: 10px;">
            <label for="coberturaBananinha">Escolha 1 Cobertura (Obrigatório):</label>
            <select id="coberturaBananinha">
                <option value="">-- Selecionar --</option>
                <option value="Cobertura de Chocolate">Cobertura de Chocolate</option>
                <option value="Leite Condensado">Leite Condensado</option>
            </select>
        </div>

        <h3>🛵 Pagamento</h3>
        <label>Valor da Entrega:</label>
        <input type="text" value="R$ 2,00" disabled class="taxa-entrega">

        <label for="pagamento">Forma de Pagamento:</label>
        <select id="pagamento" required>
            <option value="">Como prefere pagar?</option>
            <option value="Pix">Pix</option>
            <option value="Cartão">Cartão</option>
            <option value="Dinheiro">Dinheiro</option>
        </select>

        <button type="button" onclick="enviarWhatsApp()">🚀 Finalizar Pedido no WhatsApp</button>
    </form>
</div>

window.onload = function() {
    if (!saladaDisponivel) document.getElementById('optSalada').remove();
    if (!churrosDisponivel) document.getElementById('optChurros').remove();
    if (!sanduicheDisponivel) document.getElementById('optSanduiche').remove();
};
